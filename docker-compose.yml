version: "3.8"

services:
  opendata-ua:
    build:
      context: .
      network: host
    image: opendata-ua:latest
    container_name: opendata-ua
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./main.py:/app/main.py:ro
      - ./server:/app/server:ro
      - ./webui:/app/webui:ro
      - ./data:/app/data
    environment:
      - TZ=${TZ:-Asia/Taipei}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8188/api/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s