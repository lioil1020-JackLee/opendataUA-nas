name: Build and Release OpendataUA

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.build_type }} on ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        build_type: [onedir, onefile]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --group build

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          uv run --locked --no-sync pyinstaller OpendataUA-${{ matrix.build_type }}.spec
          if ("${{ matrix.build_type }}" -eq "onedir") {
            cd dist
            $target = Get-ChildItem -Directory | Select-Object -First 1 -ExpandProperty Name
            Compress-Archive -Path "$target" -DestinationPath "OpendataUA-Windows-onedir.zip" -Force
          }

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          uv run --locked --no-sync pyinstaller OpendataUA-${{ matrix.build_type }}.spec
          cd dist
          if [ "${{ matrix.build_type }}" = "onedir" ]; then
            target_dir=$(find . -maxdepth 1 -type d -not -path "." | head -n 1)
            zip -r OpendataUA-macOS-onedir.zip "$target_dir"
          else
            target_file=$(find . -maxdepth 1 -type f -not -name "*.zip" | head -n 1)
            zip OpendataUA-macOS-onefile.zip "$target_file"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpendataUA-${{ matrix.build_type }}-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.exe

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw_artifacts

      - name: Prepare Release Assets
        shell: bash
        run: |
          mkdir -p final_assets
          find raw_artifacts -type f \( -name "OpendataUA-*.zip" -o -name "OpendataUA-*.exe" \) -exec cp {} final_assets/ \;
          ls -lh final_assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: final_assets/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
